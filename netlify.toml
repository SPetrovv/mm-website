[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_EMAILJS_PUBLIC_KEY,VITE_EMAILJS_SERVICE_ID,VITE_EMAILJS_TEMPLATE_ASK_ADVICE_ID,VITE_EMAILJS_TEMPLATE_PROFILE_REVIEW_ID,VITE_CLOUDINARY_CLOUD_NAME,VITE_CLOUDINARY_UPLOAD_PRESET"

[functions]
  directory = "netlify/functions"

# Run: npx netlify-cli dev  → open the printed URL (not :5173 alone).
# Netlify proxies to Vite and serves /.netlify/functions locally.
[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
